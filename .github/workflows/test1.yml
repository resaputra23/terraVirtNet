# This is a basic workflow to help you get started with Actions

name: Test chaining-job

on:  
  # for manual , if you need 
  workflow_dispatch:

jobs: 
  job_1:
    runs-on: ubuntu-latest
    steps:
     - run: "echo Job: ${{ github.job }}"
  job_2:
    runs-on: ubuntu-latest
    needs: job_1
    steps:
     - run: "echo Job: ${{ github.job }}"
  job_3:
    runs-on: ubuntu-latest
    needs: job_1
    steps:
     - run: "echo Job: ${{ github.job }}"
  job_4:
    runs-on: ubuntu-latest
    needs: [job_2, job_3]
    steps:
    - run: "echo Job: ${{ github.job }}"
